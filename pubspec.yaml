publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.8 <4.0.0' # Updated for better compatibility

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  http: ^1.6.0
  geolocator: ^14.0.2
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.10.0
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true